name: Reusable Secret Scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin" v8.24.2
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run gitleaks
        run: gitleaks git --redact --verbose --exit-code 1
